# ══════════════════════════════════════════════════════════════════════
# SiMMER HEXAPOD — JOINT CONFIGURATION
# ══════════════════════════════════════════════════════════════════════
#
# HARDWARE:
#   2x PCA9685 I2C PWM Boards, each with 16 channels (0–15)
#   Board 1 (0x40): Left-side legs (1,3,5) + manipulator joint 2
#   Board 2 (0x41): Right-side legs (2,4,6) + manipulator joints 1,3
#
# SERVO NUMBER CONVENTION:
#   servo 1–16   → Board 1, physical channel = servo - 1
#   servo 17–32  → Board 2, physical channel = (servo - 1) % 16
#   The i2cpwm_board ROS node handles this routing automatically.
#
# CALIBRATION VALUES:
#   min_input / max_input = raw PCA9685 tick counts (0–4095 range, but
#   servos typically use 96–530 for the 1ms–2ms pulse at 50Hz PWM)
#   These were individually tuned per servo to match mechanical limits.
#   Board 1 servos: typical range ~96–511 (~414 ticks)
#   Board 2 servos: typical range ~99–530 (~430 ticks)
#
# AXIS SIGN CONVENTION:
#   axis: +1 → increasing angle = increasing PWM tick count
#   axis: -1 → increasing angle = decreasing PWM tick count (inverted)
#   This accounts for servo mounting orientation per joint.
#
# METADATA FIELDS (not used by motor_controller.py — for documentation only):
#   servo_id  → unique ID across all servos (1–21)
#   board_id  → which physical PCA9685 board (1 or 2)
#
# ═══════════════════ PHYSICAL CHANNEL MAP ═════════════════════
#
# BOARD 1 (0x40):                      BOARD 2 (0x41):
# Ch  Servo  Joint      Leg            Ch  Servo  Joint      Leg
# ──  ─────  ─────────  ───            ──  ─────  ─────────  ───
#  0    1    joint_1_1  Leg1 Hip        0    17   joint_2_1  Leg2 Hip
#  1    2    joint_1_2  Leg1 Mid        1    18   joint_2_2  Leg2 Mid
#  2    3    joint_1_3  Leg1 Knee       2    19   joint_2_3  Leg2 Knee
#  3    —    (spare)                    3    —    (spare)
#  4    5    joint_3_1  Leg3 Hip        4    21   joint_4_1  Leg4 Hip
#  5    6    joint_3_2  Leg3 Mid        5    22   joint_4_2  Leg4 Mid
#  6    7    joint_3_3  Leg3 Knee       6    23   joint_4_3  Leg4 Knee
#  7    —    (spare)                    7    —    (spare)
#  8    9    joint_5_1  Leg5 Hip        8    25   joint_6_1  Leg6 Hip
#  9   10    joint_5_2  Leg5 Mid        9    26   joint_6_2  Leg6 Mid
# 10   11    joint_5_3  Leg5 Knee      10    27   joint_6_3  Leg6 Knee
# 11    —    (spare)                   11    —    (spare)
# 12   13    joint_m_2  Manip J2       12    29   joint_m_1  Manip J1
# 13    —    (spare)                   13    30   joint_m_3  Manip J3
# 14    —    (spare)                   14    —    (spare)
# 15    —    (spare)                   15    —    (spare)
#
# ══════════════════════════════════════════════════════════════════════

lmm_joints:

    # ── LEG 1 (Left-Front) — Board 1, Channels 0–2 ──────────────

    joint_1_1:
        servo: 1                     # Board 1, Channel 0
        min_angle: -1.5708           # -π/2 rad
        max_angle: 1.5708            # +π/2 rad
        min_input: 96                # PCA9685 ticks at min_angle
        max_input: 510               # PCA9685 ticks at max_angle
        axis: -1                     # Inverted mounting
        servo_id: 1                  # Unique servo ID
        board_id: 1                  # Physical board

    joint_1_2:
        servo: 2                     # Board 1, Channel 1
        min_angle: -1.5708
        max_angle: 1.5708
        min_input: 96
        max_input: 511
        axis: -1
        servo_id: 2
        board_id: 1

    joint_1_3:
        servo: 3                     # Board 1, Channel 2
        min_angle: -3.1416           # -π rad
        max_angle: 0                 # 0 rad
        min_input: 96
        max_input: 510
        axis: +1
        servo_id: 3
        board_id: 1

    # ── LEG 2 (Right-Front) — Board 2, Channels 0–2 ─────────────

